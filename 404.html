<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Signal Lost</title>
<meta name="robots" content="noindex">
<script>/* honour the theme chosen on the main site; dark is the default */
(function(){try{if(localStorage.getItem('theme')==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
<style>
:root{--bark:#211A10;--kraft:#D3C4A2;--kraft-dim:#A99B7D;--phos:#8CF56B;--threat:#E8603F;--moss:#33512F}
html[data-theme="light"]{--bark:#EFE8D6;--kraft:#2B2316;--kraft-dim:#6B5D45;--phos:#1E7A10;--threat:#BC4222;--moss:#8FA878}
html[data-theme="light"] body::after{opacity:.35}
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100svh;display:flex;align-items:center;justify-content:center;
  background:var(--bark);color:var(--kraft);text-align:center;padding:24px;
  font-family:"JetBrains Mono","Cascadia Code",Consolas,monospace;
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(0,0,0,.14) 3px 4px);
}
.box{max-width:560px}
.code{
  font-size:clamp(72px,18vw,140px);font-weight:700;line-height:1;color:var(--threat);
  text-shadow:0 0 40px rgba(232,96,63,.35);
}
.tag{
  display:inline-block;margin-top:14px;padding:8px 14px;border:1px solid var(--moss);
  font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--phos);
}
p{margin-top:22px;color:var(--kraft-dim);font-size:14px;line-height:1.7}
a{
  display:inline-block;margin-top:26px;padding:12px 22px;color:var(--phos);
  border:1px solid var(--phos);text-decoration:none;font-size:12px;
  letter-spacing:.18em;text-transform:uppercase;transition:background .2s,color .2s;
}
a:hover{background:var(--phos);color:var(--bark)}
.blink{animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
@media(prefers-reduced-motion:reduce){.blink{animation:none}}
</style>
</head>
<body>
<div class="box">
  <div class="code">404</div>
  <div class="tag">[ SIGNAL LOST ]</div>
  <p>&gt; requested resource not found on this perimeter.<br>&gt; the packet was intercepted, or it never existed.<span class="blink">_</span></p>
  <a href="/portfolio/">Re-establish uplink</a>
</div>
</body>
</html>
